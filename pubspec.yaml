name: route
description: A Flutter app to chat with LLMs offered by OpenRouter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  uuid: ^4.5.1
  intl: ^0.20.2
  record: ^7.1.0
  audioplayers: ^6.7.1
  file_selector: ^1.1.0
  share_plus: ^13.1.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.0
  flutter_riverpod: ^3.3.2
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoCondensed
      fonts:
        - asset: assets/fonts/RobotoCondensed.ttf
